name: CI Authz Integrity Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  authz-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run release gate (authz + integrity)
        run: npm run test:release-authz-integrity
