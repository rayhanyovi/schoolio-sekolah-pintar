name: CI Release Readiness Strict Gate

on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:

jobs:
  release-readiness-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run strict release readiness gate
        run: npm run release:readiness:strict

      - name: Upload readiness report artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-status-strict
          path: |
            docs/RELEASE_READINESS_STATUS.md
            RELEASE_READINESS_STATUS.md
          if-no-files-found: error
