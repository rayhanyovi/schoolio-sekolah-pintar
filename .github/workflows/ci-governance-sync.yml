name: CI Governance Sync Check

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  governance-sync-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify governance checklist sync
        run: npm run governance:check-sync
